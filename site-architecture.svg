<marker id="o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#ED7100" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#DD344C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>


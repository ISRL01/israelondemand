<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img">
<title>israelondemand.dev architecture on AWS</title>
<desc>Deploy path: VS Code to GitHub to AWS Amplify, which builds, hosts, serves over a global CDN with managed HTTPS. Serve path: visitor to Route 53 to Amplify. Visitor counter path: browser calls a Lambda Function URL, Lambda increments two counters in a DynamoDB table and writes logs to CloudWatch. Alerting: a CloudWatch alarm on Lambda errors and an AWS Budgets spend threshold both publish to an SNS topic which emails an alert. IAM governs access throughout.</desc>
<style>text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}</style>

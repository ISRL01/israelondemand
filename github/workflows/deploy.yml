# .github/workflows/deploy.yml
# Syncs your site to S3 on every push to main.
# (CloudFront cache-invalidation will be added here later, once CloudFront exists.)
# This is filled in for your account and bucket. Just make sure the IAM role you
# create is named exactly:  github-actions-deploy

name: Deploy to S3

on:
  push:
    branches: [main]

permissions:
  id-token: write        # lets GitHub log in to AWS via OIDC (no stored keys)
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::712789089773:role/github-actions-deploy
          aws-region: us-east-1

      - name: Sync site to S3
        run: aws s3 sync . s3://israelondemand.com --delete --exclude ".git/*" --exclude ".github/*" --exclude "*.md"
